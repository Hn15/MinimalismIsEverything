<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalism Is Everything</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=globe&display=swap" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      height: 100vh;
      display: flex;
      background: #000000;
      color: #eeeeee;
      overflow: hidden;
    }

    /* Sidebar - Right Side */
    .sidebar {
      width: 68px;
      background: #0a0a0a;
      border-left: 1px solid #222222;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 30px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #333 #111;
    }

    .sidebar::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 20px;
    }

    /* Add Button - Perfectly Centered */
    .add-btn {
      width: 42px;
      height: 42px;
      background: #222222;
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 25px;
      transition: all 0.3s ease;
      position: relative;
      box-shadow: 0 0 15px rgba(255,255,255,0.08);
    }

    .add-btn:hover {
      background: #333333;
      transform: scale(1.08);
    }

    .add-btn .plus {
      position: absolute;
      transition: all 0.4s ease;
      font-size: 26px;
      line-height: 1;
    }

    .add-btn .globe {
      position: absolute;
      font-family: 'Material Symbols Outlined';
      font-size: 24px;
      opacity: 0;
      transition: all 0.4s ease;
      transform: rotate(-20deg);
    }

    .add-btn:hover .plus {
      opacity: 0;
      transform: rotate(180deg) scale(0.6);
    }

    .add-btn:hover .globe {
      opacity: 1;
      transform: rotate(0deg);
    }

    .shortcuts {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: all 0.25s ease;
      padding: 4px 0;
      position: relative;
    }

    .shortcut:hover {
      transform: translateY(-2px);
    }

    .shortcut img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: contain;
      background: #111;
      padding: 2px;
    }

    .shortcut span {
      margin-top: 6px;
      font-size: 0.72rem;
      color: #888;
      text-align: center;
      max-width: 52px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .spacer {
      width: 28px;
      height: 1px;
      background: linear-gradient(to right, transparent, #333, transparent);
      margin: 8px 0;
    }

    /* Context Menu */
    .context-menu {
      position: absolute;
      background: #111111;
      border: 1px solid #333333;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      padding: 8px 0;
      z-index: 2000;
      min-width: 220px;
      display: none;
    }

    .context-menu div {
      padding: 10px 16px;
      color: #cccccc;
      font-size: 0.95rem;
      cursor: default;
    }

    .context-menu .name {
      color: #ffffff;
      font-weight: 500;
      border-bottom: 1px solid #222;
    }

    .context-menu .url {
      color: #777777;
      font-size: 0.85rem;
      word-break: break-all;
      border-bottom: 1px solid #222;
    }

    .context-menu .delete {
      color: #ff5555;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .context-menu .delete:hover {
      background: #330000;
    }

    .trash-icon {
      width: 18px;
      height: 18px;
      fill: #ff5555;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .welcome {
      position: absolute;
      top: 35px;
      left: 45px;
      font-size: 1.15rem;
      color: #aaaaaa;
      z-index: 10;
    }

    .header {
      position: absolute;
      top: 95px;
      font-family: 'Orbitron', sans-serif;
      font-size: 2.45rem;
      font-weight: 500;
      letter-spacing: 6px;
      color: #ffffff;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(255,255,255,0.18), 0 0 45px rgba(80,180,255,0.12);
    }

    .time {
      position: absolute;
      top: 155px;
      font-size: 1.6rem;
      color: #bbbbbb;
      letter-spacing: 4px;
    }

    .weather {
      position: absolute;
      top: 205px;
      font-size: 1.18rem;
      color: #777777;
      letter-spacing: 1px;
    }

    .search-container {
      width: 100%;
      max-width: 720px;
      padding: 0 20px;
      margin-top: 90px;
    }

    .search-box {
      width: 100%;
      padding: 21px 34px;
      font-size: 1.42rem;
      border: 1.5px solid #222222;
      border-radius: 60px;
      outline: none;
      background: #0a0a0a;
      color: #eeeeee;
      box-shadow: 0 8px 40px rgba(0,0,0,0.75), 0 0 28px rgba(255,255,255,0.09);
      transition: all 0.4s ease;
    }

    .search-box:focus {
      border-color: #555555;
      box-shadow: 0 12px 55px rgba(0,0,0,0.8), 0 0 40px rgba(255,255,255,0.18);
      background: #111111;
    }

    .search-box::placeholder {
      color: #555555;
    }

    footer {
      position: absolute;
      bottom: 45px;
      font-size: 0.93rem;
      color: #444444;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: #111111;
      padding: 45px 55px;
      border-radius: 22px;
      border: 1px solid #333333;
      text-align: center;
      max-width: 420px;
    }

    .modal h2 {
      color: #ffffff;
      margin-bottom: 15px;
      font-weight: 300;
      font-size: 1.8rem;
    }

    .modal input {
      width: 100%;
      padding: 16px 22px;
      font-size: 1.25rem;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 12px;
      color: #eee;
      margin-bottom: 18px;
      outline: none;
    }

    .modal button {
      padding: 14px 50px;
      font-size: 1.15rem;
      background: #333333;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      margin: 8px 6px;
    }

    .modal button:hover {
      background: #555555;
    }
  </style>
</head>
<body>

  <!-- Main Content -->
  <div class="main-content">
    <div class="welcome" id="welcomeMsg"></div>
    <div class="header">Minimalism Is Everything</div>
    <div class="time" id="time"></div>
    <div class="weather" id="weather">Detecting weather...</div>

    <div class="search-container">
      <input type="text" class="search-box" placeholder="Search or enter URL ;3" autofocus id="searchInput">
    </div>

    <footer>minimalism is everything © 2026 all rights reserved</footer>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="add-btn" id="addBtn" title="Add shortcut">
      <span class="plus">+</span>
      <span class="globe">globe</span>
    </div>
    <div class="shortcuts" id="shortcutsList"></div>
  </div>

  <!-- Username Modal -->
  <div class="modal" id="usernameModal">
    <div class="modal-content">
      <h2>Welcome aboard</h2>
      <p>What should we call you?</p>
      <input type="text" id="usernameInput" placeholder="Your name" maxlength="20">
      <button onclick="saveUsername()">Continue</button>
    </div>
  </div>

  <!-- Add Shortcut Modal -->
  <div class="modal" id="addShortcutModal">
    <div class="modal-content">
      <h2>Add New Shortcut</h2>
      <input type="text" id="shortcutName" placeholder="Name (e.g. YouTube)">
      <input type="text" id="shortcutURL" placeholder="URL (e.g. youtube.com)">
      <div>
        <button onclick="addShortcut()">Add</button>
        <button onclick="closeAddModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu">
    <div class="name" id="menuName"></div>
    <div class="url" id="menuURL"></div>
    <div class="delete" id="deleteOption">
      <svg class="trash-icon" viewBox="0 0 24 24">
        <path d="M3 6h18v2H3V6zm2 3h14v12a2 2 0 01-2 2H7a2 2 0 01-2-2V9z"/>
        <path d="M10 11v6M14 11v6"/>
      </svg>
      Delete Shortcut
    </div>
  </div>

  <script>
    // Cookie functions
    function setCookie(name, value, days) {
      const expires = new Date(Date.now() + days * 864e5).toUTCString();
      document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
    }

    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? decodeURIComponent(match[2]) : null;
    }

    function checkUsername() {
      const username = getCookie('username');
      if (username) {
        document.getElementById('usernameModal').style.display = 'none';
        document.getElementById('welcomeMsg').textContent = `Welcome, ${username}`;
      } else {
        document.getElementById('usernameModal').style.display = 'flex';
      }
    }

    function saveUsername() {
      let name = document.getElementById('usernameInput').value.trim() || 'Explorer';
      setCookie('username', name, 365);
      document.getElementById('usernameModal').style.display = 'none';
      document.getElementById('welcomeMsg').textContent = `Welcome, ${name}`;
    }

    // Time (WITA)
    function updateTime() {
      const now = new Date();
      const options = { timeZone: 'Asia/Makassar', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
      document.getElementById('time').textContent = now.toLocaleTimeString('en-US', options);
    }
    setInterval(updateTime, 1000);
    updateTime();

    // Weather
    async function getWeather() {
      const weatherEl = document.getElementById('weather');
      if (!navigator.geolocation) return weatherEl.textContent = "Geolocation not supported";

      navigator.geolocation.getCurrentPosition(async (pos) => {
        try {
          const { latitude: lat, longitude: lon } = pos.coords;
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`);
          const data = await res.json();
          const temp = Math.round(data.current.temperature_2m);
          const code = data.current.weather_code;
          let condition = "Clear";
          if ([3,45,48].includes(code)) condition = "Cloudy";
          else if ([51,53,55,61,63,65,71,73,75,77,80,81,82,85,86].includes(code)) condition = "Rain / Snow";
          else if ([95,96,99].includes(code)) condition = "Thunderstorm";

          const city = data.timezone.split('/').pop().replace(/_/g, ' ');
          weatherEl.innerHTML = `${temp}°C • ${condition} • ${city}`;
        } catch (e) {
          weatherEl.innerHTML = '<span class="error">Weather unavailable</span>';
        }
      }, () => weatherEl.innerHTML = '<span class="error">Location permission denied</span>');
    }
    getWeather();

    // Search
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        let q = e.target.value.trim();
        if (!q) return;
        if (q.includes('.') && !q.includes(' ')) {
          window.location.href = q.startsWith('http') ? q : 'https://' + q;
        } else {
          window.location.href = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
        }
      }
    });

    // Shortcuts System
    let shortcuts = [];
    let currentContextIndex = -1;

    function loadShortcuts() {
      const saved = localStorage.getItem('dashboardShortcuts');
      shortcuts = saved ? JSON.parse(saved) : [];
      renderShortcuts();
    }

    function saveShortcuts() {
      localStorage.setItem('dashboardShortcuts', JSON.stringify(shortcuts));
    }

    function renderShortcuts() {
      const container = document.getElementById('shortcutsList');
      container.innerHTML = '';

      shortcuts.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'shortcut';
        div.dataset.index = index;
        div.innerHTML = `
          <img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(item.url)}&sz=64" alt="${item.name}" onerror="this.src='https://via.placeholder.com/36/222/fff?text=?'">
          <span>${item.name}</span>
        `;

        // Left click → open site
        div.addEventListener('click', () => {
          window.open(item.url, '_blank');
        });

        // Right click → show context menu
        div.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          showContextMenu(e, index, item);
        });

        container.appendChild(div);

        if (index < shortcuts.length - 1) {
          const spacer = document.createElement('div');
          spacer.className = 'spacer';
          container.appendChild(spacer);
        }
      });
    }

    function showContextMenu(e, index, item) {
      const menu = document.getElementById('contextMenu');
      document.getElementById('menuName').textContent = item.name;
      document.getElementById('menuURL').textContent = item.url;

      currentContextIndex = index;

      // Position menu near cursor (but not off-screen)
      let x = e.clientX + 10;
      let y = e.clientY + 10;

      if (x + 240 > window.innerWidth) x = window.innerWidth - 250;
      if (y + 180 > window.innerHeight) y = e.clientY - 180;

      menu.style.left = `${x}px`;
      menu.style.top = `${y}px`;
      menu.style.display = 'block';
    }

    // Delete function
    document.getElementById('deleteOption').addEventListener('click', () => {
      if (currentContextIndex === -1) return;
      if (confirm("Delete this shortcut?")) {
        shortcuts.splice(currentContextIndex, 1);
        saveShortcuts();
        renderShortcuts();
      }
      hideContextMenu();
    });

    function hideContextMenu() {
      const menu = document.getElementById('contextMenu');
      menu.style.display = 'none';
      currentContextIndex = -1;
    }

    // Close context menu when clicking anywhere else
    document.addEventListener('click', hideContextMenu);

    function addShortcut() {
      const name = document.getElementById('shortcutName').value.trim();
      let url = document.getElementById('shortcutURL').value.trim();
      if (!name || !url) return alert("Please fill both name and URL");
      if (!url.startsWith('http')) url = 'https://' + url;

      shortcuts.push({ name, url });
      saveShortcuts();
      renderShortcuts();
      closeAddModal();
    }

    function closeAddModal() {
      document.getElementById('addShortcutModal').style.display = 'none';
      document.getElementById('shortcutName').value = '';
      document.getElementById('shortcutURL').value = '';
    }

    document.getElementById('addBtn').addEventListener('click', () => {
      document.getElementById('addShortcutModal').style.display = 'flex';
    });

    // Initialize
    window.onload = () => {
      checkUsername();
      loadShortcuts();
    };
  </script>
</body>
</html>
