<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalism Is Everything</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Combined Material Symbols Outlined (globe + edit + delete) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=delete,edit,globe" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      height: 100vh;
      background: #000000;
      color: #eeeeee;
      overflow: hidden;
      display: flex;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body { flex-direction: row; }
    body.sidebar-top, body.sidebar-bottom { flex-direction: column; }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .sidebar {
      background: #0a0a0a;
      border: 1px solid #222222;
      display: flex;
      align-items: center;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  height 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  padding 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Vertical */
    body.sidebar-left .sidebar, body.sidebar-right .sidebar {
      width: 68px;
      height: 100%;
      flex-direction: column;
      padding-top: 20px;
    }
    body.sidebar-left .sidebar  { border-right: 1px solid #222; order: -1; }
    body.sidebar-right .sidebar { border-left:  1px solid #222; }

    /* Horizontal */
    body.sidebar-top .sidebar, body.sidebar-bottom .sidebar {
      height: 78px;
      width: 100%;
      flex-direction: row;
      padding: 0 25px;
    }
    body.sidebar-top .sidebar  { border-bottom: 1px solid #222; }
    body.sidebar-bottom .sidebar { border-top: 1px solid #222; }

    /* Spacing */
    body.sidebar-left .sidebar .add-btn,
    body.sidebar-right .sidebar .add-btn { margin-bottom: 32px; }
    body.sidebar-top .sidebar .add-btn,
    body.sidebar-bottom .sidebar .add-btn { margin-right: 32px; }

    /* Add Button with + → globe transition */
    .add-btn {
      width: 42px;
      height: 42px;
      background: #222222;
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      box-shadow: 0 0 15px rgba(255,255,255,0.08);
      flex-shrink: 0;
      margin: 0 12px;
    }
    .add-btn:hover { background: #333; transform: scale(1.08); }

    .add-btn .plus { transition: all 0.4s ease; }
    .add-btn .globe {
      position: absolute;
      font-family: 'Material Symbols Outlined';
      font-size: 24px;
      opacity: 0;
      transition: all 0.4s ease;
      transform: rotate(-20deg);
    }
    .add-btn:hover .plus { opacity: 0; transform: rotate(180deg) scale(0.6); }
    .add-btn:hover .globe { opacity: 1; transform: rotate(0deg); }

    /* Shortcuts */
    .shortcuts {
      display: flex;
      gap: 22px;
      align-items: center;
      flex-wrap: nowrap;
    }
    body.sidebar-left .shortcuts, body.sidebar-right .shortcuts {
      flex-direction: column;
      gap: 22px;
      width: 100%;
    }
    body.sidebar-top .shortcuts, body.sidebar-bottom .shortcuts {
      flex-direction: row;
      overflow-x: auto;
      scrollbar-width: none;
    }
    body.sidebar-top .shortcuts::-webkit-scrollbar,
    body.sidebar-bottom .shortcuts::-webkit-scrollbar { display: none; }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: grab;
      transition: all 0.25s ease;
      flex-shrink: 0;
      user-select: none;
    }
    .shortcut:active { cursor: grabbing; }
    .shortcut:hover { transform: translateY(-2px); }

    .shortcut img {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: #111;
      padding: 2px;
    }
    .shortcut span {
      margin-top: 6px;
      font-size: 0.72rem;
      color: #888;
      max-width: 52px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .spacer {
      width: 28px; height: 1px;
      background: linear-gradient(to right, transparent, #333, transparent);
      margin: 8px 0;
      flex-shrink: 0;
      opacity: 0.35;
    }
    body.sidebar-top .spacer, body.sidebar-bottom .spacer {
      width: 1px; height: 32px;
      background: linear-gradient(to bottom, transparent, #333, transparent);
    }

    /* Main UI */
    .welcome { position: absolute; top: 35px; left: 45px; font-size: 1.15rem; color: #aaaaaa; z-index: 10; }
    .header { position: absolute; top: 95px; font-family: 'Orbitron', sans-serif; font-size: 2.45rem; font-weight: 500; letter-spacing: 6px; color: #ffffff; text-transform: uppercase; text-shadow: 0 0 20px rgba(255,255,255,0.18), 0 0 45px rgba(80,180,255,0.12); }
    .time { position: absolute; top: 155px; font-size: 1.6rem; color: #bbbbbb; letter-spacing: 4px; }
    .weather { position: absolute; top: 205px; font-size: 1.18rem; color: #777777; letter-spacing: 1px; }

    .search-container { width: 100%; max-width: 720px; padding: 0 20px; margin-top: 90px; }
    .search-box {
      width: 100%; padding: 21px 34px; font-size: 1.42rem;
      border: 1.5px solid #222222; border-radius: 60px; outline: none;
      background: #0a0a0a; color: #eeeeee;
      box-shadow: 0 8px 40px rgba(0,0,0,0.75), 0 0 28px rgba(255,255,255,0.09);
    }
    .search-box:focus {
      border-color: #555555;
      box-shadow: 0 12px 55px rgba(0,0,0,0.8), 0 0 40px rgba(255,255,255,0.18);
      background: #111111;
    }

    footer { position: absolute; bottom: 45px; font-size: 0.93rem; color: #444444; }

    /* Context Menus */
    .context-menu {
      position: absolute;
      background: #111111;
      border: 1px solid #333333;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      padding: 8px 0;
      z-index: 3000;
      min-width: 220px;
      display: none;
    }
    .context-menu div {
      padding: 11px 18px;
      color: #cccccc;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .context-menu div:hover { background: #222222; }
    .context-menu .name { color: #ffffff; font-weight: 500; border-bottom: 1px solid #222; }
    .context-menu .url { color: #777777; font-size: 0.85rem; word-break: break-all; border-bottom: 1px solid #222; }
    .context-menu .edit { color: #55aaff; display: flex; align-items: center; gap: 10px; }
    .context-menu .delete { color: #ff5555; display: flex; align-items: center; gap: 10px; }

    /* Modals */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      display: none; align-items: center; justify-content: center; z-index: 4000;
    }
    .modal-content {
      background: #111111;
      padding: 40px 50px;
      border-radius: 20px;
      border: 1px solid #333333;
      text-align: center;
      max-width: 420px;
      width: 90%;
    }
    .modal h2 { color: #ffffff; margin-bottom: 20px; font-size: 1.8rem; }
    .modal input {
      width: 100%; padding: 14px 18px; margin-bottom: 15px;
      background: #1a1a1a; border: 1px solid #444; border-radius: 12px;
      color: #eee; font-size: 1.1rem; outline: none;
    }
    .modal button {
      padding: 12px 30px; margin: 6px; font-size: 1.05rem;
      background: #333333; color: white; border: none; border-radius: 30px;
      cursor: pointer;
    }
    .modal button:hover { background: #555555; }
  </style>
</head>
<body class="sidebar-right">

  <div class="main-content">
    <div class="welcome" id="welcomeMsg"></div>
    <div class="header">Minimalism Is Everything</div>
    <div class="time" id="time"></div>
    <div class="weather" id="weather">Detecting weather...</div>

    <div class="search-container">
      <input type="text" class="search-box" placeholder="Search or enter URL ;3" autofocus id="searchInput">
    </div>

    <footer>minimalism is everything © 2026 all rights reserved</footer>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="add-btn" id="addBtn" title="Add shortcut">
      <span class="plus">+</span>
      <span class="globe">globe</span>
    </div>
    <div class="shortcuts" id="shortcutsList"></div>
  </div>

  <!-- Sidebar Position Menu (no Top) -->
  <div class="context-menu" id="sidebarPositionMenu">
    <div data-position="bottom">Bottom (Horizontal)</div>
    <div data-position="left">Left (Vertical)</div>
    <div data-position="right">Right (Vertical)</div>
  </div>

  <!-- Shortcut Context Menu -->
  <div class="context-menu" id="shortcutContextMenu">
    <div class="name" id="menuName"></div>
    <div class="url" id="menuURL"></div>
    <div class="edit" id="editOption">
      <span class="material-symbols-outlined" style="font-size:18px;">edit</span> 
      Edit Shortcut
    </div>
    <div class="delete" id="deleteOption">
      <span class="material-symbols-outlined" style="font-size:18px;">delete</span> 
      Delete Shortcut
    </div>
  </div>

  <!-- Modals (unchanged) -->
  <div class="modal" id="addShortcutModal">
    <div class="modal-content">
      <h2>Add New Shortcut</h2>
      <input type="text" id="shortcutName" placeholder="Name (e.g. YouTube)">
      <input type="text" id="shortcutURL" placeholder="URL (e.g. youtube.com)">
      <div>
        <button onclick="addShortcut()">Add</button>
        <button onclick="closeAddModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="modal" id="editShortcutModal">
    <div class="modal-content">
      <h2>Edit Shortcut</h2>
      <input type="text" id="editName" placeholder="Name">
      <input type="text" id="editURL" placeholder="URL">
      <div>
        <button onclick="saveEdit()">Save</button>
        <button onclick="closeEditModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="modal" id="usernameModal">
    <div class="modal-content">
      <h2>Welcome aboard</h2>
      <p>What should we call you?</p>
      <input type="text" id="usernameInput" placeholder="Your name" maxlength="20">
      <button onclick="saveUsername()">Continue</button>
    </div>
  </div>

  <script>
    // Username
    function checkUsername() {
      const saved = localStorage.getItem('username');
      if (saved) {
        document.getElementById('welcomeMsg').textContent = `Welcome, ${saved}`;
      } else {
        document.getElementById('usernameModal').style.display = 'flex';
      }
    }

    function saveUsername() {
      const name = document.getElementById('usernameInput').value.trim();
      if (!name) return alert("Please enter a name");
      localStorage.setItem('username', name);
      document.getElementById('welcomeMsg').textContent = `Welcome, ${name}`;
      document.getElementById('usernameModal').style.display = 'none';
    }

    // Time with seconds
    function updateTime() {
      const timeEl = document.getElementById('time');
      function tick() {
        const now = new Date();
        let h = now.getHours();
        let m = now.getMinutes().toString().padStart(2, '0');
        let s = now.getSeconds().toString().padStart(2, '0');
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        timeEl.textContent = `${h}:${m}:${s} ${ampm}`;
      }
      tick();
      setInterval(tick, 1000);
    }

    // Weather: "26 | clear"
    function getWeather() {
      const weatherEl = document.getElementById('weather');
      if (!navigator.geolocation) {
        weatherEl.textContent = 'Location unavailable';
        return;
      }
      navigator.geolocation.getCurrentPosition(async (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        try {
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`);
          const data = await res.json();
          const temp = Math.round(data.current.temperature_2m);
          const code = data.current.weather_code;

          let condition = 'clear';
          if (code >= 1 && code <= 3) condition = 'cloudy';
          else if (code >= 45 && code <= 48) condition = 'fog';
          else if (code >= 51 && code <= 67) condition = 'rain';
          else if (code >= 71 && code <= 77) condition = 'snow';
          else if (code >= 80 && code <= 82) condition = 'rain';
          else if (code >= 95) condition = 'thunderstorm';

          weatherEl.textContent = `${temp} | ${condition}`;
        } catch (e) {
          weatherEl.textContent = 'Weather unavailable';
        }
      }, () => {
        weatherEl.textContent = 'Location denied';
      });
    }

    // Search
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        let q = this.value.trim();
        if (!q) return;
        this.value = '';
        if (/^https?:\/\//i.test(q) || (q.includes('.') && !q.includes(' '))) {
          if (!q.startsWith('http')) q = 'https://' + q;
          window.open(q, '_blank');
        } else {
          window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}`, '_blank');
        }
      }
    });

    // Shortcuts logic (unchanged)
    let shortcuts = [];
    let currentEditIndex = -1;
    let draggedIndex = -1;

    function loadShortcuts() {
      shortcuts = JSON.parse(localStorage.getItem('dashboardShortcuts') || '[]');
      renderShortcuts();
    }

    function saveShortcuts() {
      localStorage.setItem('dashboardShortcuts', JSON.stringify(shortcuts));
    }

    function renderShortcuts() {
      const container = document.getElementById('shortcutsList');
      container.innerHTML = '';

      shortcuts.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'shortcut';
        div.draggable = true;
        div.dataset.index = index;

        div.innerHTML = `
          <img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(item.url)}&sz=64" onerror="this.src='https://via.placeholder.com/36/222/fff?text=?'">
          <span>${item.name}</span>
        `;

        div.addEventListener('click', () => window.open(item.url, '_blank'));
        div.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          showShortcutContextMenu(e, index, item);
        });

        div.addEventListener('dragstart', () => draggedIndex = index);
        div.addEventListener('dragover', e => e.preventDefault());
        div.addEventListener('drop', (e) => {
          e.preventDefault();
          if (draggedIndex === index) return;
          const [moved] = shortcuts.splice(draggedIndex, 1);
          shortcuts.splice(index, 0, moved);
          saveShortcuts();
          renderShortcuts();
        });

        container.appendChild(div);

        if (index < shortcuts.length - 1) {
          const spacer = document.createElement('div');
          spacer.className = 'spacer';
          container.appendChild(spacer);
        }
      });
    }

    function showShortcutContextMenu(e, index, item) {
      document.getElementById('sidebarPositionMenu').style.display = 'none';
      const menu = document.getElementById('shortcutContextMenu');
      document.getElementById('menuName').textContent = item.name;
      document.getElementById('menuURL').textContent = item.url;
      currentEditIndex = index;

      let x = e.clientX + 10;
      let y = e.clientY + 10;
      if (x + 250 > window.innerWidth) x = window.innerWidth - 260;
      if (y + 200 > window.innerHeight) y = e.clientY - 210;

      menu.style.left = `${x}px`;
      menu.style.top = `${y}px`;
      menu.style.display = 'block';
    }

    document.getElementById('editOption').addEventListener('click', () => {
      if (currentEditIndex === -1) return;
      const item = shortcuts[currentEditIndex];
      document.getElementById('editName').value = item.name;
      document.getElementById('editURL').value = item.url.replace(/^https?:\/\//, '');
      document.getElementById('editShortcutModal').style.display = 'flex';
      document.getElementById('shortcutContextMenu').style.display = 'none';
    });

    function saveEdit() {
      if (currentEditIndex === -1) return;
      let name = document.getElementById('editName').value.trim();
      let url = document.getElementById('editURL').value.trim();
      if (!name || !url) return alert("Please fill both fields");
      if (!url.startsWith('http')) url = 'https://' + url;

      shortcuts[currentEditIndex] = { name, url };
      saveShortcuts();
      renderShortcuts();
      closeEditModal();
    }

    function closeEditModal() {
      document.getElementById('editShortcutModal').style.display = 'none';
    }

    document.getElementById('deleteOption').addEventListener('click', () => {
      if (currentEditIndex === -1) return;
      if (confirm("Delete this shortcut?")) {
        shortcuts.splice(currentEditIndex, 1);
        saveShortcuts();
        renderShortcuts();
      }
      document.getElementById('shortcutContextMenu').style.display = 'none';
    });

    document.getElementById('addBtn').addEventListener('click', () => {
      document.getElementById('shortcutContextMenu').style.display = 'none';
      document.getElementById('addShortcutModal').style.display = 'flex';
    });

    function addShortcut() {
      const name = document.getElementById('shortcutName').value.trim();
      let url = document.getElementById('shortcutURL').value.trim();
      if (!name || !url) return alert("Please fill both fields");
      if (!url.startsWith('http')) url = 'https://' + url;

      shortcuts.push({ name, url });
      saveShortcuts();
      renderShortcuts();
      closeAddModal();
    }

    function closeAddModal() {
      document.getElementById('addShortcutModal').style.display = 'none';
      document.getElementById('shortcutName').value = '';
      document.getElementById('shortcutURL').value = '';
    }

    // Sidebar position
    document.getElementById('sidebar').addEventListener('contextmenu', (e) => {
      if (e.target.closest('.add-btn') || e.target.closest('.shortcut')) return;
      e.preventDefault();
      document.getElementById('shortcutContextMenu').style.display = 'none';

      const menu = document.getElementById('sidebarPositionMenu');
      let x = e.clientX + 12, y = e.clientY + 12;
      if (x + 210 > window.innerWidth) x = e.clientX - 215;
      if (y + 180 > window.innerHeight) y = e.clientY - 190;
      menu.style.left = `${x}px`;
      menu.style.top = `${y}px`;
      menu.style.display = 'block';
    });

    document.getElementById('sidebarPositionMenu').addEventListener('click', (e) => {
      const opt = e.target.closest('div');
      if (!opt) return;
      applySidebarPosition(opt.dataset.position);
      document.getElementById('sidebarPositionMenu').style.display = 'none';
    });

    function applySidebarPosition(pos) {
      const body = document.body;
      body.classList.remove('sidebar-top','sidebar-bottom','sidebar-left','sidebar-right');
      void body.offsetWidth;
      body.classList.add(`sidebar-${pos}`);
      setTimeout(renderShortcuts, 80);
    }

    function loadPosition() {
      const saved = localStorage.getItem('sidebarPosition') || 'right';
      applySidebarPosition(saved);
    }

    document.addEventListener('click', () => {
      document.getElementById('shortcutContextMenu').style.display = 'none';
      document.getElementById('sidebarPositionMenu').style.display = 'none';
    });

    // Init
    window.onload = () => {
      checkUsername();
      loadShortcuts();
      loadPosition();
      updateTime();
      getWeather();
    };
  </script>
</body>
</html>
